#    uses: ./.github/workflows/gpu-tests.yml
#    secrets: inherit
#    permissions:
#      contents: read

  saas-tests:
    name: Integrations
    uses: ./.github/workflows/integration-saas-tests.yml
    secrets: inherit
    permissions:
      contents: read
