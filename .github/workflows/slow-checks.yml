name: Slow-Checks

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
          required: true
      DOCKER_PASSWORD:
          required: true
jobs:
  integration-tests:
    name: Integrations
    uses: ./.github/workflows/integration-tests.yml
    secrets: inherit
    permissions:
      contents: read

  gpu-tests:
    name: Integrations
    uses: ./.github/workflows/gpu-tests.yml
    secrets: inherit
    permissions:
      contents: read

  saas-tests:
    name: Integrations
    uses: ./.github/workflows/integration-saas-tests.yml
    secrets: inherit
    permissions:
      contents: read
