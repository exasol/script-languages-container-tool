name: Slow-Checks

on:
  workflow_call:
    secrets:
      CI4_DOCKERHUB_USERNAME:
          required: true
      CI4_DOCKERHUB_TOKEN:
          required: true
jobs:
  integration-tests:
    name: Integrations
    uses: ./.github/workflows/integration-tests.yml
    secrets: inherit
    permissions:
      contents: read

